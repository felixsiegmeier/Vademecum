name: Build Windows App

on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Build frontend
        working-directory: frontend
        run: |
          npm ci
          npm run build

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install Python dependencies
        run: |
          pip install pyinstaller
          pip install -r backend/requirements.txt

      - name: Build Windows bundle
        run: pyinstaller arztbrief.spec

      - name: Create ZIP archive
        run: |
          Compress-Archive -Path "dist\arztbrief\*" -DestinationPath "arztbrief-windows.zip"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: arztbrief-windows
          path: arztbrief-windows.zip
          retention-days: 30

      # Erstellt automatisch ein GitHub Release wenn ein Tag gepusht wird (z.B. v1.0.0)
      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: arztbrief-windows.zip
          generate_release_notes: true
